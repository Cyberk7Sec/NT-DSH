<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #0e0f13;
  --surface:      #13151a;
  --border:       rgba(255,255,255,0.06);
  --white:        #f0f0f0;
  --white-dim:    rgba(240,240,240,0.5);
  --white-muted:  rgba(240,240,240,0.2);
  --accent:       #4F8EF7;
  --accent-sub:   rgba(79,142,247,0.12);
  --accent-line:  rgba(79,142,247,0.22);
  /* meal type pastels */
  --c-break:  rgba(220,200,160,0.13);  --c-break-bd: rgba(220,200,160,0.3);  --c-break-txt: #d4c090;
  --c-lunch:  rgba(126,184,212,0.1);   --c-lunch-bd: rgba(126,184,212,0.25); --c-lunch-txt: #9ac8e0;
  --c-snack:  rgba(155,135,195,0.1);   --c-snack-bd: rgba(155,135,195,0.25); --c-snack-txt: #b8a8d8;
  --c-dinner: rgba(106,168,120,0.1);   --c-dinner-bd:rgba(106,168,120,0.25); --c-dinner-txt:#88c89a;
  --c-mochi:  rgba(195,135,145,0.1);   --c-mochi-bd: rgba(195,135,145,0.25); --c-mochi-txt: #c89090;
}
html, body { background: var(--bg); font-family: 'Space Grotesk', sans-serif; overflow: hidden; width: 100%; }

.strip {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.strip-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.strip-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.strip-label::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--accent);
  opacity: 0.5;
}

.status-badge {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 2px;
  background: var(--accent-sub);
  color: var(--accent);
  border: 1px solid var(--accent-line);
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.day-header {
  text-align: center;
  padding: 5px 4px;
  border-radius: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}

.day-name {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white-muted);
}

.day-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--white-dim);
  line-height: 1.2;
}

.day-col.today .day-header {
  background: var(--accent-sub);
  border-bottom-color: var(--accent-line);
}

.day-col.today .day-name { color: var(--accent); }
.day-col.today .day-num  { color: var(--accent); }

.meal-chip {
  border-radius: 3px;
  padding: 3px 5px;
  border: 1px solid transparent;
  min-height: 28px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.meal-type {
  font-family: 'Space Mono', monospace;
  font-size: 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 1px;
}

.meal-name {
  font-size: 9px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--white-dim);
}

.meal-empty {
  color: var(--white-muted);
  font-style: italic;
  opacity: 0.4;
}

.chip-b { background: var(--c-break);  border-color: var(--c-break-bd);  }
.chip-b .meal-type { color: var(--c-break-txt); }

.chip-l { background: var(--c-lunch);  border-color: var(--c-lunch-bd);  }
.chip-l .meal-type { color: var(--c-lunch-txt); }

.chip-s { background: var(--c-snack);  border-color: var(--c-snack-bd);  }
.chip-s .meal-type { color: var(--c-snack-txt); }

.chip-d { background: var(--c-dinner); border-color: var(--c-dinner-bd); }
.chip-d .meal-type { color: var(--c-dinner-txt); }

.chip-m { background: var(--c-mochi);  border-color: var(--c-mochi-bd);  }
.chip-m .meal-type { color: var(--c-mochi-txt); }

.chip-empty { background: rgba(255,255,255,0.02); border-color: var(--border); }

.loading { text-align: center; color: var(--white-muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; padding: 20px; }
.error   { text-align: center; color: rgba(195,135,145,0.6); font-family: 'Space Mono', monospace; font-size: 9px; padding: 10px; }
</style>
</head>
<body>
<div class="strip">
  <div class="strip-header">
    <div class="strip-label">Weekly Menu</div>
    <div class="status-badge" id="last-updated">Loading...</div>
  </div>
  <div class="days-grid" id="days-grid">
    <div class="loading">Fetching meal plan...</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUBKXZgJvM80pDQgJy7Lfh89k0IyZNoTWxWMHssp6cqKXI1KCWEADkcwpsekOVEnXQ/exec';

const DAYS_SHORT  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MEAL_KEYS   = ['Breakfast','Lunch','Snack','Dinner','Moochies'];
const MEAL_CHIP   = ['chip-b','chip-l','chip-s','chip-d','chip-m'];
const MEAL_ABBR   = ['Break','Lunch','Snack','Dinner','Moochi'];

function getWeekDates() {
  const today = new Date();
  const dow   = today.getDay(); // 0=Sun
  const week  = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - dow + i);
    week.push(d);
  }
  return week;
}

function buildEmptyGrid(dates) {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  const today = new Date().toDateString();

  dates.forEach((d, i) => {
    const col  = document.createElement('div');
    col.className = 'day-col' + (d.toDateString() === today ? ' today' : '');
    col.dataset.date = d.toISOString().split('T')[0];

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS_SHORT[d.getDay()]}</div>
        <div class="day-num">${d.getDate()}</div>
      </div>
      ${MEAL_KEYS.map((k,mi) => `
        <div class="meal-chip chip-empty" id="chip-${i}-${mi}">
          <div class="meal-type">${MEAL_ABBR[mi]}</div>
          <div class="meal-name meal-empty">—</div>
        </div>
      `).join('')}
    `;
    grid.appendChild(col);
  });
}

function applyData(data) {
  // data expected: array of { Date, Breakfast, Lunch, Snack, Dinner, Moochies }
  const dates  = getWeekDates();
  const lookup = {};
  (data || []).forEach(row => {
    if (row.Date) lookup[row.Date] = row;
  });

  dates.forEach((d, i) => {
    const key = d.toISOString().split('T')[0];
    const row = lookup[key];
    if (!row) return;
    MEAL_KEYS.forEach((k, mi) => {
      const chip = document.getElementById(`chip-${i}-${mi}`);
      if (!chip) return;
      const val = (row[k] || '').trim();
      chip.className = `meal-chip ${val ? MEAL_CHIP[mi] : 'chip-empty'}`;
      chip.querySelector('.meal-name').textContent = val || '—';
      chip.querySelector('.meal-name').classList.toggle('meal-empty', !val);
    });
  });
}

async function loadMenu() {
  const dates = getWeekDates();
  buildEmptyGrid(dates);

  try {
    const res  = await fetch(`${SCRIPT_URL}?section=MENU_WEEKLY`);
    const json = await res.json();
    applyData(json.data || json);
    document.getElementById('last-updated').textContent = 'Live';
  } catch (e) {
    // Fallback: show demo data so page never looks broken
    const demo = getWeekDates().map((d, i) => ({
      Date: d.toISOString().split('T')[0],
      Breakfast: ['Overnight Oats','Pancakes','Eggs & Toast','Porridge','Smoothie Bowl','Sourdough + Eggs','Rest Day'][i] || '',
      Lunch:     ['Stir Fry Rice','Chicken Wrap','Lomo Saltado','Quinoa Bowl','Leftovers','Jerk Chicken','Brunch'][i] || '',
      Snack:     ['Protein Shake','Banana Bread','Fruit','Protein Bar','Smoothie','Cheesecake','—'][i] || '',
      Dinner:    ['Lomo Saltado','Jerk Chicken','Pasta','Asian Stir Fry','Soup','Pizza Night','Family Dinner'][i] || '',
      Moochies:  ['Ninja Creami','—','Coconut Pop','—','Ninja Creami','Cheesecake','—'][i] || '',
    }));
    applyData(demo);
    document.getElementById('last-updated').textContent = 'Demo';
  }
}

loadMenu();
setInterval(loadMenu, 120000); // refresh every 2min
</script>
</body>
</html>
