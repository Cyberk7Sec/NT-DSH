<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamuvia Header Enhanced</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0f13;
    --surface:  #13151a;
    --surface2: #1a1d25;
    --border:   rgba(255,255,255,0.06);
    --border2:  rgba(255,255,255,0.1);

    --white:    #f0f0f0;
    --white-dim: rgba(240,240,240,0.55);
    --white-muted: rgba(240,240,240,0.2);
    --white-ghost: rgba(240,240,240,0.07);

    --accent:   #4F8EF7;
    --accent-dim: rgba(79,142,247,0.35);
    --accent-subtle: rgba(79,142,247,0.1);
    --accent-line: rgba(79,142,247,0.25);

    --kat:      #c8a96e;
    --kat-dim:  rgba(200,169,110,0.35);
    --nej:      #7eb8d4;
    --nej-dim:  rgba(126,184,212,0.35);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }

  .wrap {
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Very subtle dot grid */
  .wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(79,142,247,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top accent bar */
  .top-rule {
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--accent) 20%,
      var(--accent-dim) 60%,
      transparent 100%
    );
    flex-shrink: 0;
  }

  /* Main content row */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* ── LEFT: Identity ── */
  .identity {
    flex: 0.9;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.5s ease forwards;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .name-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }

  .name-main {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -2px;
  }

  .name-suffix {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white-dim);
    letter-spacing: -0.5px;
    margin-left: 6px;
  }

  .name-accent {
    color: var(--accent);
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 2px;
  }

  .meta-tag {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid;
  }

  .mt-kat {
    color: var(--kat);
    border-color: var(--kat-dim);
    background: rgba(200,169,110,0.06);
  }

  .mt-nej {
    color: var(--nej);
    border-color: var(--nej-dim);
    background: rgba(126,184,212,0.06);
  }

  .mt-loc {
    color: var(--white-muted);
    border-color: var(--border);
    background: transparent;
    font-size: 7px;
    letter-spacing: 2px;
  }

  /* ── CENTER: Clock + Weather ── */
  .center-block {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 40px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    gap: 6px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .clock-time {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .clock-sep {
    color: var(--accent);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  .date-info {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--white-muted);
  }

  .date-sep {
    width: 1px;
    height: 12px;
    background: var(--border);
  }

  .day-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    opacity: 0.8;
  }

  .weather-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--white-muted);
    margin-top: 2px;
  }

  .weather-icon {
    font-size: 14px;
  }



  .stats-row-mini {
    display: flex;
    gap: 16px;
  }

  /* ── BOTTOM NAV ── */
  .nav {
    height: 40px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0 40px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease 0.3s both;
  }

  .nav-item {
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-muted);
    padding: 0 18px;
    display: flex;
    align-items: center;
    gap: 7px;
    border-right: 1px solid var(--border);
    cursor: default;
    transition: color 0.15s, background 0.15s;
    position: relative;
  }

  .nav-item:first-child { padding-left: 0; }

  .nav-item:hover {
    color: var(--white);
    background: var(--white-ghost);
  }

  .nav-item.active {
    color: var(--accent);
  }

  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .nav-icon {
    font-size: 10px;
    opacity: 0.6;
  }

  .nav-spacer { flex: 1; }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--white-muted);
  }

  .live-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 3px rgba(74,222,128,0); }
  }

  .week-badge {
    background: var(--accent-subtle);
    border: 1px solid var(--accent-line);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border-radius: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-rule"></div>

  <div class="main">

    <div class="identity">
      <div class="eyebrow">Home Command Center</div>
      <div class="name-row">
        <span class="name-main">Jamuvia<span class="name-accent">.</span></span>
        <span class="name-suffix">Home OS</span>
      </div>
      <div class="meta-row">
        <span class="meta-tag mt-kat">Kat</span>
        <span class="meta-tag mt-nej">Nejaun</span>
        <span class="meta-tag mt-loc">Elizabeth, NJ</span>
        <span class="week-badge" id="week-badge">WK —</span>
      </div>
    </div>

    <div class="center-block">
      <div class="clock-time" id="clock">--<span class="clock-sep">:</span>--</div>
      <div class="date-info">
        <span id="clock-date">— —</span>
        <div class="date-sep"></div>
        <span class="day-name" id="clock-day">———</span>
      </div>
      <div class="weather-info">
        <span class="weather-icon" id="weather-icon">🌤</span>
        <span id="weather-temp">28°F</span>
        <span id="weather-condition">Partly Cloudy</span>
      </div>
    </div>



  </div>

  <div class="nav">
    <a class="nav-item active" href="PASTE_HOME_URL"       target="_blank"><span class="nav-icon">⌂</span>Home</a>
    <a class="nav-item"        href="PASTE_NUTRITION_URL"  target="_blank"><span class="nav-icon">◈</span>Nutrition</a>
    <a class="nav-item"        href="PASTE_FINANCES_URL"   target="_blank"><span class="nav-icon">◎</span>Finances</a>
    <a class="nav-item"        href="PASTE_BUSINESS_URL"   target="_blank"><span class="nav-icon">▣</span>Business</a>
    <a class="nav-item"        href="PASTE_GROWTH_URL"     target="_blank"><span class="nav-icon">◇</span>Growth</a>
    <a class="nav-item"        href="PASTE_CHORES_URL"     target="_blank"><span class="nav-icon">✦</span>Chores</a>
    <div class="nav-spacer"></div>
    <div class="nav-right">
      <div class="live-dot"></div>
      <span id="nav-status">Live</span>
    </div>
  </div>
</div>

<script>
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function weekNum(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day  = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - day);
    const y = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return Math.ceil((((date - y) / 86400000) + 1) / 7);
  }

  function tick() {
    const now = new Date();
    const h   = String(now.getHours()).padStart(2,'0');
    const m   = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').innerHTML = `${h}<span class="clock-sep">:</span>${m}`;
    document.getElementById('clock-date').textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}`;
    document.getElementById('clock-day').textContent  = DAYS[now.getDay()].toUpperCase();
    document.getElementById('week-badge').textContent = `WK ${weekNum(now)}`;
  }

  tick();
  setInterval(tick, 1000);

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUBKXZgJvM80pDQgJy7Lfh89k0IyZNoTWxWMHssp6cqKXI1KCWEADkcwpsekOVEnXQ/exec';

  function setEl(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function rentDays() {
    const now  = new Date();
    let rent   = new Date(now.getFullYear(), now.getMonth(), 1);
    if (rent <= now) rent = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    return Math.ceil((rent - now) / 86400000);
  }

  async function loadStats() {
    setEl('stat-rent', rentDays() + 'd');

    try {
      const res  = await fetch(`${SCRIPT_URL}?section=BUDGET`);
      const json = await res.json();
      const flat = {};
      (json.data || []).forEach(r => { if (r.Key) flat[r.Key] = r.Value; });

      const spent = parseFloat(flat.GROCERY_SPENT  || 0);
      const total = parseFloat(flat.GROCERY_BUDGET || 200);
      const left  = Math.max(0, total - spent);
      setEl('stat-grocery', '$' + Math.round(left));

      const sCurr = parseFloat(flat.SAVINGS_CURRENT || 0);
      const sGoal = parseFloat(flat.SAVINGS_GOAL || 3000);
      setEl('stat-savings', '$' + Math.round(sCurr).toLocaleString());

      const katScore = flat.CHORES_KAT || '0';
      const nejScore = flat.CHORES_NEJ || '0';
      setEl('stat-chores-kat', 'Kat ' + katScore);
      setEl('stat-chores-nej', 'Nej ' + nejScore);
      setEl('nav-status', 'Live');
    } catch(e) {
      setEl('nav-status', 'Offline');
    }
  }

  // Placeholder weather (replace with API if needed)
  function updateWeather() {
    const temps = [28, 32, 35, 38, 42, 45, 48, 52];
    const conditions = ['🌤 Cloudy', '⛅ Partly Cloudy', '☁️ Overcast', '🌧 Rainy', '❄️ Snowy'];
    const temp = temps[Math.floor(Math.random() * temps.length)];
    const condition = conditions[Math.floor(Math.random() * conditions.length)];
    setEl('weather-temp', temp + '°F');
    setEl('weather-condition', condition);
  }

  loadStats();
  updateWeather();
  setInterval(loadStats, 60000);
</script>
</body>
</html>
