<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdowns</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f13;--surface:#13151a;--border:rgba(255,255,255,0.06);
  --white:#f0f0f0;--wd:rgba(240,240,240,0.55);--wm:rgba(240,240,240,0.22);
  --accent:#4F8EF7;--as:rgba(79,142,247,0.1);--al:rgba(79,142,247,0.2);
  --kat:#c8a96e;--kat-s:rgba(200,169,110,0.08);--kat-l:rgba(200,169,110,0.2);
  --nej:#7eb8d4;--nej-s:rgba(126,184,212,0.08);--nej-l:rgba(126,184,212,0.18);
  --lav:#b8a8d8;--lav-s:rgba(184,168,216,0.08);--lav-l:rgba(184,168,216,0.2);
  --rose:#c89090;--rose-s:rgba(200,144,144,0.08);--rose-l:rgba(200,144,144,0.2);
}
html,body{width:100%;background:var(--bg);font-family:'Space Grotesk',sans-serif;overflow:hidden}
.block{background:var(--bg);padding:clamp(12px,1.5vw,18px) clamp(14px,2vw,22px);display:flex;flex-direction:column;gap:10px}
.block-label{
  font-family:'Space Mono',monospace;font-size:clamp(7px,0.7vw,9px);letter-spacing:3px;text-transform:uppercase;
  color:var(--wm);display:flex;align-items:center;justify-content:space-between;
}
.label-left{display:flex;align-items:center;gap:8px}
.label-left::before{content:'';width:14px;height:1px;background:var(--lav);opacity:.5}
.countdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px}
.cd-card{
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:clamp(10px,1.2vw,14px);display:flex;flex-direction:column;gap:4px;
  position:relative;overflow:hidden;transition:border-color .15s;
}
.cd-card:hover{border-color:rgba(255,255,255,0.12)}
.cd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
/* accent top lines per type */
.cd-anniversary::before{background:linear-gradient(90deg,var(--kat),transparent)}
.cd-exam::before{background:linear-gradient(90deg,var(--lav),transparent)}
.cd-bday::before{background:linear-gradient(90deg,var(--nej),transparent)}
.cd-goal::before{background:linear-gradient(90deg,var(--accent),transparent)}
.cd-anniversary{background:var(--kat-s);border-color:var(--kat-l)}
.cd-exam{background:var(--lav-s);border-color:var(--lav-l)}
.cd-bday{background:var(--nej-s);border-color:var(--nej-l)}
.cd-goal{background:var(--as);border-color:var(--al)}
.cd-label{font-family:'Space Mono',monospace;font-size:clamp(6px,0.6vw,8px);letter-spacing:2px;text-transform:uppercase;color:var(--wm)}
.cd-name{font-size:clamp(10px,1vw,13px);font-weight:500;color:var(--wd);line-height:1.3}
.cd-main{display:flex;align-items:baseline;gap:4px;margin:4px 0 2px}
.cd-days{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,2.8vw,36px);font-weight:700;letter-spacing:-1px;line-height:1}
.cd-unit{font-family:'Space Mono',monospace;font-size:clamp(7px,0.7vw,9px);color:var(--wm);align-self:flex-end;padding-bottom:2px}
.n-kat{color:var(--kat)}.n-lav{color:var(--lav)}.n-nej{color:var(--nej)}.n-accent{color:var(--accent)}
.cd-date{font-family:'Space Mono',monospace;font-size:clamp(6px,0.6vw,8px);color:rgba(240,240,240,0.18);letter-spacing:.5px}
/* progress line for exam */
.cd-bar{height:1px;background:rgba(255,255,255,0.04);border-radius:1px;overflow:hidden;margin-top:3px}
.cd-fill{height:100%;border-radius:1px;background:var(--lav);opacity:.5}
</style>
</head>
<body>
<div class="block">
  <div class="block-label">
    <div class="label-left">Countdowns</div>
    <span id="cd-today" style="font-size:clamp(6px,0.6vw,8px);letter-spacing:1px;color:rgba(240,240,240,0.18)">—</span>
  </div>
  <div class="countdown-grid" id="cd-grid">
    <!-- rendered by JS -->
  </div>
</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzUBKXZgJvM80pDQgJy7Lfh89k0IyZNoTWxWMHssp6cqKXI1KCWEADkcwpsekOVEnXQ/exec';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function daysUntil(dateStr){
  const target=new Date(dateStr);
  target.setHours(0,0,0,0);
  const now=new Date();now.setHours(0,0,0,0);
  return Math.ceil((target-now)/86400000);
}

function fmtDate(dateStr){
  const d=new Date(dateStr);
  return MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

// EDIT THESE to match your real dates
const COUNTDOWNS=[
  {label:'Anniversary',name:'Kat & Nejaun',date:'2026-09-02',type:'Anniversary',color:'n-kat'},
  {label:'Exam Target',name:'CompTIA A+ Core 2',date:'2026-07-31',type:'exam',color:'n-lav',barStart:'2026-01-01'},
  {label:'Birthday',name:"Nejaun's B-Day",date:'2026-06-14',type:'bday',color:'n-nej'},
  {label:'Goal',name:"Eli in USA",date:'2026-06-10',type:'goal',color:'n-accent'},
];

function render(items){
  const today=new Date();
  const el=document.getElementById('cd-today');
  if(el)el.textContent=MONTHS[today.getMonth()].toUpperCase()+' '+today.getDate();

  const grid=document.getElementById('cd-grid');
  grid.innerHTML=items.map(item=>{
    const days=daysUntil(item.date);
    const past=days<0;
    const barPct=item.barStart?Math.min(100,Math.max(0,
      ((new Date()-new Date(item.barStart))/(new Date(item.date)-new Date(item.barStart)))*100
    )):null;
    return`<div class="cd-card cd-${item.type}">
      <div class="cd-label">${item.label}</div>
      <div class="cd-name">${item.name}</div>
      <div class="cd-main">
        <span class="cd-days ${past?'':item.color}" style="${past?'color:rgba(240,240,240,0.2)':''}">${past?'—':days}</span>
        <span class="cd-unit">${past?'passed':'days'}</span>
      </div>
      ${barPct!==null?`<div class="cd-bar"><div class="cd-fill" style="width:${barPct}%"></div></div>`:''}
      <div class="cd-date">${fmtDate(item.date)}</div>
    </div>`;
  }).join('');
}

// Try to load custom dates from sheet COUNTDOWNS section, fallback to hardcoded
async function load(){
  try{
    const res=await fetch(`${SCRIPT_URL}?section=COUNTDOWN`);
    const json=await res.json();
    const rows=json.data||[];
    if(rows.length>0){
      // Sheet format: Key=name, Value=YYYY-MM-DD, Who=type
      const items=rows.map(r=>({
        label:r.Who||'Event',name:r.Key||'—',date:r.Value,
        type:(r.Who||'goal').toLowerCase().includes('ann')?'anniversary':
             (r.Who||'').toLowerCase().includes('exam')?'exam':
             (r.Who||'').toLowerCase().includes('bday')?'bday':'goal',
        color:(r.Who||'').toLowerCase().includes('kat')?'n-kat':
              (r.Who||'').toLowerCase().includes('nej')?'n-nej':'n-accent'
      }));
      render(items);
    }else{render(COUNTDOWNS)}
  }catch(e){render(COUNTDOWNS)}
}
load();setInterval(load,300000);
</script>
</body>
</html>
